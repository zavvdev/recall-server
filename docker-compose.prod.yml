services:
  # We don't expose DB ports like in dev config for security reasons.
  # Only web container can reach it internally via Docker network.
  # If you need to expose ports temporarily for dev purposes,
  # expose them here but do not forget to remove them after.
  db:
    image: postgres:16
    env_file:
      - .env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    # Automatically restarts the container if it crashes or the server reboots.
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: prod
    # Replaces Django's dev server with Gunicorn for production.
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./src:/app
      - static_volume:/app/staticfiles
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy  # wait until healthcheck passes
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
    # Only Nginx exposes ports in production — not web or db.
    # Port 80 is HTTP, 443 is HTTPS. All public traffic goes through
    # Nginx first, then Nginx forwards it to Gunicorn internally.
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: always

volumes:
  postgres_data_prod:
  static_volume:
